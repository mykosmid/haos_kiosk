---
configuration:
  ha_token:
    name: "HA Long-Lived Access Token"
    description: |
      Long-lived access token for Home Assistant [Required]. Generate one
      from your HA user profile (bottom of the page, "Long-Lived Access
      Tokens" section, "Create Token").
  ha_url:
    name: "HA URL"
    description: |
      Base URL for HA [Default: http://localhost:8123]
  entities:
    name: "Entities"
    description: |
      Comma-separated list of entity_ids to display, e.g.
      "light.living_room,switch.fan,sensor.temperature" [Required]. Order
      shown matches the order listed here. light/switch/input_boolean/fan
      entities can be tapped to toggle; everything else is shown read-only.
  shopping_list_entity:
    name: "Shopping List Entity"
    description: |
      Entity ID of a Home Assistant 'todo' list to show as a read-only
      widget in the bottom-right quarter of the display, e.g.
      "todo.shopping_list" (the built-in Shopping List integration's
      default entity). Tap it to expand it full-screen; tap anywhere to
      collapse it back. Set to "none" to hide the widget entirely.
      [Default: todo.shopping_list]
  chores_entities:
    name: "Chores Entities"
    description: |
      Comma-separated list of Home Assistant 'todo' list entity_ids to
      combine into a tap-to-toggle widget in the top-right quarter of the
      display, e.g. "todo.chores,todo.roommate_chores". Unlike the shopping
      list widget, each item shows a square toggle button - red while
      pending, green once completed - and tapping it flips that item's
      status in Home Assistant. Leave blank to disable (disabled by
      default, since there's no built-in chores list entity).
  dark_mode:
    name: "Dark Mode"
    description: |
      Use a dark color scheme for the dashboard if 'True', otherwise light.
      [Default: True]
  debug_mode:
    name: "Debug Mode"
    description: |
      For debugging purposes, sleeps without launching the kiosk display.
      [Default: False]
      Manually launch it (e.g., `python3 /kiosk.py`) from the Docker
      container. E.g., `sudo docker exec -it addon_haoskiosk bash`
  min_free_memory_mb:
    name: "Minimum Free Memory (MB)"
    description: |
      If available system memory drops below this many MB, proactively
      restart the kiosk display rather than risk the kernel OOM-killer
      freezing it on memory-constrained devices. Set to 0 to disable.
      [Default: 100]
  screensaver_timeout_s:
    name: "Screensaver Timeout (seconds)"
    description: |
      Turn the display into a smart-frame screensaver (full-screen clock,
      plus rotating photos if configured below) after this many seconds
      with no touch input. Only touches count as activity - Home Assistant
      state changes do not reset this timer or wake the display. Tapping
      the screen while the screensaver is showing only wakes it back to the
      normal dashboard; that tap is not also applied to the dashboard
      underneath. Set to 0 to disable the screensaver entirely.
      [Default: 60]
  screensaver_source_dir:
    name: "Screensaver Source Directory"
    description: |
      Absolute path to a "drop zone" folder for full-resolution photos, e.g.
      "/media/screensaver_uploads" (a folder under Home Assistant's /media,
      mapped read-write into this Add-on - drop files in there via the
      Media or File Editor Add-on). Searched recursively.

      If set, the Add-on moves every photo it finds here into Screensaver
      Photo Directory, downscaled/cropped to exactly fill the display -
      deleting each original from this folder once its resized copy is
      saved. This folder is meant to sit empty between uploads; it isn't
      mirrored or reconciled against the destination, photos just pass
      through it once. Must not be the same folder as, or a parent of the
      same tree you also read manually - in particular don't point this at
      Screensaver Photo Directory itself or vice versa. Leave blank to
      manage Screensaver Photo Directory's contents yourself instead.
      [Default: blank]
  screensaver_photo_dir:
    name: "Screensaver Photo Directory"
    description: |
      Absolute path to the folder of photos (.jpg/.jpeg/.png/.bmp/.gif) the
      screensaver actually rotates through full-screen.

      If Screensaver Source Directory is set, this folder is the permanent,
      Add-on-managed destination photos get moved into - to remove a photo
      from the screensaver, delete it here directly (it won't reappear,
      since the original in the source folder is already gone). If
      Screensaver Source Directory is blank, populate this folder yourself;
      photos aren't resized in that case, so pre-size them to the display's
      resolution for best results. Leave both settings blank to show just
      the clock/date on a black background. [Default: /media/screensavers]
  screensaver_photo_interval_s:
    name: "Screensaver Photo Interval (seconds)"
    description: |
      How long each photo is shown before rotating to the next one, while
      the screensaver is active. Only relevant if Screensaver Photo
      Directory has photos in it. [Default: 300]
  screensaver_sync_interval_s:
    name: "Screensaver Sync Interval (seconds)"
    description: |
      How often to check Screensaver Source Directory for newly-dropped
      photos and move/resize them into Screensaver Photo Directory. Only
      relevant if Screensaver Source Directory is configured. [Default:
      600]
