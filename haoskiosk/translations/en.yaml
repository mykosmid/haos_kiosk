---
configuration:
  ha_username:
    name: "HA Username"
    description: "Home Assistant login user name [Required]"
  ha_password:
    name: "HA Password"
    description: "Home Assistant login password [Required]"
  ha_url:
    name: "HA URL"
    description: |
      Base URL for HA [Default: http://localhost:8123]
  ha_dashboard:
    name: "HA Dashboard"
    description: 'Dashboard path (following "HA URL") [Default: ""]'
  login_delay:
    name: "Login Delay"
    description: |
      Time to wait for login page to load in seconds [Default: 1.0]
      Note: Often can set to '0'
  browser_refresh:
    name: "Browser Refresh"
    description: |
      Browser refresh interval in seconds; 0 for never [Default: 600]
  screen_timeout:
    name: "Screen Timeout"
    description: "Time in seconds until screen blanks; 0 for never [Default: 0]"
  output_number:
    name: "Output Number"
    description: |
      Choose which of the *connected* video output ports to use.
      Set to 1 to use the first connected port. [Default: 1]
  rotate_display:
    name: "Rotate Display"
    description: "Rotate display [Default: Normal]"
    items:
      normal: "Normal (no rotation)"
      left: "Left (90deg CCW)"
      right: "Right (90deg CW)"
      inverted: "Inverted (180deg)"
  map_touch_inputs:
    name: "Map Touch Inputs"
    description: |
      If 'True', then map all touch pointer inputs to the selected
      video output. [Default: True]
  keyboard_layout:
    name: "Keyboard Layout"
    description: "Set the keyboard layout and language [Default: us]"
  debug_mode:
    name: "Debug Mode"
    description: |
      Launch X but not browser. [Default: False]
      Manually access using: docker exec -it addon_haoskiosk bash
  screensaver_enabled:
    name: "Screensaver Enabled"
    description: |
      Show a fullscreen image slideshow after a period of inactivity, using
      images from Home Assistant's local Media folder. Any touch, mouse or
      key input dismisses it. [Default: False]
  screensaver_timeout:
    name: "Screensaver Timeout"
    description: "Idle time in seconds before the screensaver starts [Default: 300]"
  screensaver_interval:
    name: "Screensaver Interval"
    description: "Time in seconds between images in the slideshow [Default: 15]"
  screensaver_media_folder:
    name: "Screensaver Media Folder"
    description: |
      Name of the folder under Home Assistant's local Media source that
      holds the screensaver images. Upload images to it via the Home
      Assistant app or web UI's Media page. [Default: "screensaver"]
