---
name: "HAOS Kiosk Display"
description: "Minimal native framebuffer kiosk for Home Assistant touchscreen display"
version: "2.3.0"
slug: "haoskiosk"
url: https://github.com/mykosmid/haos_kiosk/tree/main/haoskiosk

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

startup: application
host_network: true
init: false
ingress: false
homeassistant_api: true
auth_api: true
usb: true
# Needed for the CAP_SYS_TTY_CONFIG-level access that switches the console
# VT into graphics mode (KDSETMODE), which is what actually stops the kernel
# fbcon driver from repainting its blinking cursor over the framebuffer.
# The narrower privileged: capability list HA allows does not include
# SYS_TTY_CONFIG, so full hardware access is the practical way to get it.
full_access: true

ulimits:
  nofile:
    soft: 65536
    hard: 65536

devices:
  - /dev/fb0
  - /dev/tty0
  - /dev/tty1
  - /dev/console
  - /dev/input/event0
  - /dev/input/event1
  - /dev/input/event2
  - /dev/input/event3
  - /dev/input/event4
  - /dev/input/event5
  - /dev/input/event6
  - /dev/input/event7
  - /dev/input/event8
  - /dev/input/event9
  - /dev/input/event10
  - /dev/input/event11
  - /dev/input/event12
  - /dev/input/event13
  - /dev/input/event14
  - /dev/input/event15
  - /dev/input/event16
  - /dev/input/event17
  - /dev/input/event18
  - /dev/input/event19
  - /dev/input/event20
  - /dev/input/event21
  - /dev/input/event22
  - /dev/input/event23
  - /dev/input/event24
  - /dev/input/event25

map:
  - addon_config:rw
  - media:rw

options:
  ha_url: "http://localhost:8123"
  entities: ""
  shopping_list_entity: "todo.shopping_list"
  chores_entities: ""
  dark_mode: true
  debug_mode: false
  min_free_memory_mb: 100
  screensaver_timeout_s: 60
  screensaver_photo_dir: "/media/screensavers"
  screensaver_photo_interval_s: 300
  display_off_time: ""
  display_on_time: ""

schema:
  ha_token: password
  ha_url: str
  entities: str
  shopping_list_entity: str
  chores_entities: str
  dark_mode: bool
  debug_mode: bool
  min_free_memory_mb: int(0,)
  screensaver_timeout_s: int(0,)
  screensaver_photo_dir: str
  screensaver_photo_interval_s: int(5,)
  display_off_time: str
  display_on_time: str

translations:
  - en
